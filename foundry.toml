[profile.default]
src      = "contracts"
out      = "out"
libs     = ["lib"]
script   = "script"
test     = "test"

solc           = "0.8.24"
optimizer      = true
optimizer_runs = 200

remappings = [
  "solady/=lib/solady/src/",
  "account-abstraction/=lib/account-abstraction/contracts/",
  "webauthn-sol/=lib/webauthn-sol/src/",
  "FreshCryptoLib/=lib/webauthn-sol/lib/FreshCryptoLib/solidity/src/",
  "forge-std/=lib/forge-std/src/",
]
